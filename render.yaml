# Render.com tek-tikla deploy. Repo'yu Render'a baglayinca otomatik okur.
services:
  - type: web
    name: finansal-analist
    runtime: docker
    plan: free               # ucretsiz katman (15 dk hareketsizlikte uyur, ilk istekte uyanir)
    healthCheckPath: /api/status
    envVars:
      - key: ADMIN_TOKEN     # /api/refresh icin; Render panelinden gizli deger gir
        sync: false
    # NOT: Kalici disk (persistent disk) Render'da SADECE ucretli planlarda var;
    # 'plan: free' ile birlikte 'disk:' tanimi deploy'u reddediyordu. Bu yuzden disk YOK.
    # SQLite gecmisi gecici (ephemeral): servis uyandiginda warm ile yfinance'ten
    # ~3 aylik veri yeniden cekilip DB yeniden olusturulur. Kalicilik istenirse
    # ucretli plana gecip asagidaki disk blogunu acmak ve DATA_DIR=/data env'i
    # eklemek yeterli (kod DATA_DIR'i zaten destekliyor):
    #   disk:
    #     name: data
    #     mountPath: /data
    #     sizeGB: 1
